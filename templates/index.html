<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroMV</title>

<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        NeuroMV
    </div>

    <button class="new-chat-btn" onclick="newChat()">
        + New Chat
    </button>

    <div id="history"></div>

</div>

<!-- MAIN -->
<div class="main">

    <!-- CHAT -->
    <div id="chatbox"></div>

    <!-- PREVIEW -->
    <div id="previewBox"></div>

    <!-- INPUT -->
    <div class="input-area">

        <button class="plus-btn" onclick="openFile()">+</button>

        <input type="file" id="fileInput" accept="image/*" hidden>

        <input
            type="text"
            id="msg"
            placeholder="Message NeuroMV..."
            autocomplete="off"
        >

        <button class="send-btn" onclick="sendMsg()">
            Send
        </button>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
