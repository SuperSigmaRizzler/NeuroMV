<!DOCTYPE html>
<html>
<head>
    <title>NeuroMV</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <button onclick="newChat()">+ New Chat</button>
        <div id="chatList"></div>
    </div>

    <div class="main">

        <div class="header">NeuroMV</div>

        <div id="chatbox"></div>

        <div class="input-area">

            <label for="fileInput" class="upload-btn">+</label>
            <input type="file" id="fileInput" hidden>

            <input type="text" id="msg" placeholder="Tulis pesan...">

            <button onclick="sendMsg()">Kirim</button>

        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
