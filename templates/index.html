<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NeuroMV</title>
</head>
<body style="background:black;color:white;font-family:Arial;padding:20px;">

<h2>NeuroMV</h2>

<div id="chat" style="height:300px;overflow:auto;border:1px solid gray;padding:10px;"></div>
<br>

<input id="msg" placeholder="Ketik pesan..." style="width:70%;padding:10px;">
<button onclick="sendMsg()">Kirim</button>

<script>
async function sendMsg(){
    let msg = document.getElementById("msg").value;

    if(!msg) return;

    document.getElementById("chat").innerHTML += "<p><b>Kamu:</b> "+msg+"</p>";

    document.getElementById("msg").value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            message: msg
        })
    });

    let data = await res.json();

    document.getElementById("chat").innerHTML += "<p><b>NeuroMV:</b> "+data.reply+"</p>";
}
</script>

</body>
</html>
