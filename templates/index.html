<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>NeuroMV</title>

<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ========================= -->
<!-- PIN MODAL -->
<!-- ========================= -->
<div id="pinModal" class="modal hidden">
  <div class="modal-card">
    <h2>🔒 Private Access</h2>
    <p>Enter your PIN to continue</p>

    <input
      id="pinInput"
      type="password"
      maxlength="20"
      placeholder="Enter PIN"
      autocomplete="off"
    >

    <div class="modal-actions">
      <button type="button" onclick="submitPin()">Unlock</button>
      <button type="button" class="ghost" onclick="closePin()">Cancel</button>
    </div>
  </div>
</div>

<!-- ========================= -->
<!-- RENAME MODAL -->
<!-- ========================= -->
<div id="renameModal" class="modal hidden">
  <div class="modal-card">
    <h2>✏ Rename Chat</h2>

    <input
      id="renameInput"
      type="text"
      maxlength="60"
      placeholder="New name"
      autocomplete="off"
    >

    <div class="modal-actions">
      <button type="button" onclick="saveRename()">Save</button>
      <button type="button" class="ghost" onclick="closeRename()">Cancel</button>
    </div>
  </div>
</div>

<!-- ========================= -->
<!-- DELETE MODAL -->
<!-- ========================= -->
<div id="deleteModal" class="modal hidden">
  <div class="modal-card">
    <h2>🗑 Delete Chat</h2>
    <p>Are you sure you want to delete this chat?</p>

    <div class="modal-actions">
      <button type="button" class="danger" onclick="confirmDelete()">Delete</button>
      <button type="button" class="ghost" onclick="closeDelete()">Cancel</button>
    </div>
  </div>
</div>

<!-- ========================= -->
<!-- APP -->
<!-- ========================= -->
<div class="app">

  <!-- ========================= -->
  <!-- SIDEBAR -->
  <!-- ========================= -->
  <aside id="sidebar" class="sidebar">

    <!-- mobile close -->
    <div class="sidebar-close-mobile">
      <button type="button" onclick="closeSidebarMobile()">✕</button>
    </div>

    <!-- brand -->
    <div class="brand">
      <div class="logo">✦</div>

      <div class="brand-text">
        <h1>NeuroMV</h1>
        <span>Made by Marvell Jonathan</span>
      </div>
    </div>

    <!-- new chat -->
    <button type="button" class="new-chat-btn" onclick="newChat()">
      ＋ New Chat
    </button>

    <!-- section -->
    <div class="section-title">
      Chats
    </div>

    <!-- history -->
    <div id="history" class="history-list"></div>

    <!-- footer -->
    <div class="sidebar-footer">

      <button type="button" class="menu-btn" onclick="openPrivate()">
        🔒 Private
      </button>

      <button type="button" class="menu-btn" onclick="toggleMoreMenu()">
        ⋮
      </button>

      <!-- dropdown -->
      <div id="moreMenu" class="more-menu hidden">
        <button type="button" onclick="openPrivate()">🔒 Private Chats</button>
        <button type="button" onclick="setPinPrompt()">🛡 Set / Change PIN</button>
      </div>

    </div>

  </aside>

  <!-- ========================= -->
  <!-- MAIN -->
  <!-- ========================= -->
  <main class="main">

    <!-- overlay -->
    <div
      id="overlay"
      class="overlay hidden"
      onclick="closeSidebarMobile()"
    ></div>

    <!-- mobile topbar -->
    <div class="mobile-topbar">

      <button
        type="button"
        class="hamburger"
        onclick="toggleSidebar()"
      >
        ☰
      </button>

      <div class="mobile-title">
        NeuroMV
      </div>

      <div class="topbar-right">

        <div id="providerBadge" class="provider-badge">
          AI Ready
        </div>

        <button
          type="button"
          class="dots-btn"
          onclick="toggleMoreMenu()"
        >
          ⋮
        </button>

      </div>

    </div>

    <!-- ========================= -->
    <!-- CHAT AREA -->
    <!-- ========================= -->
    <div id="chat" class="chat-area">

      <div class="welcome">
        <h2>NeuroMV</h2>
        <p>Your intelligent AI assistant</p>
      </div>

    </div>

    <!-- ========================= -->
    <!-- FILE PREVIEW -->
    <!-- ========================= -->
    <div id="preview" class="preview-wrap"></div>

    <!-- ========================= -->
    <!-- INPUT AREA -->
    <!-- ========================= -->
    <form id="form" class="input-wrap">

      <!-- upload -->
      <label class="upload-btn" title="Upload File">
        +
        <input type="file" id="file" hidden>
      </label>

      <!-- textarea -->
      <textarea
        id="input"
        rows="1"
        placeholder="Message NeuroMV..."
        autocomplete="off"
        spellcheck="false"
      ></textarea>

      <!-- mic -->
      <button
        type="button"
        id="micBtn"
        class="mic-btn"
        onclick="startVoiceInput()"
        title="Voice Input"
      >
        🎙
      </button>

      <!-- send -->
      <button
        id="sendBtn"
        type="submit"
        title="Send"
      >
        ➤
      </button>

    </form>

  </main>

</div>

<script src="/static/script.js"></script>

</body>
</html>
