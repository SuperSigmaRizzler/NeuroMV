<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NeuroMV Debug</title>
</head>
<body style="background:black;color:white;font-family:Arial;padding:20px;">

<h2>NeuroMV Debug</h2>

<div id="chat" style="height:300px;overflow:auto;border:1px solid gray;padding:10px;"></div>
<br>

<input id="msg" placeholder="Ketik pesan..." style="width:70%;padding:10px;">
<button onclick="sendMsg()">Kirim</button>

<script>
async function sendMsg(){
    let msg = document.getElementById("msg").value;

    document.getElementById("chat").innerHTML += "<p>Klik terdeteksi</p>";

    try{
        let res = await fetch("/chat", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({message: msg})
        });

        document.getElementById("chat").innerHTML += "<p>Status: "+res.status+"</p>";

        let text = await res.text();

        document.getElementById("chat").innerHTML += "<p>Raw: "+text+"</p>";

    }catch(e){
        document.getElementById("chat").innerHTML += "<p>ERROR: "+e+"</p>";
    }
}
</script>

</body>
</html>
