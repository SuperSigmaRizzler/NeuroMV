<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroMV</title>

<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ========================= -->
<!-- PIN MODAL -->
<!-- ========================= -->
<div id="pinModal" class="modal hidden">
  <div class="modal-card">
    <h2>🔒 Private Access</h2>
    <p>Enter your PIN to continue</p>

    <input id="pinInput" type="password" maxlength="20" placeholder="Enter PIN">

    <div class="modal-actions">
      <button onclick="submitPin()">Unlock</button>
      <button class="ghost" onclick="closePin()">Cancel</button>
    </div>
  </div>
</div>

<!-- ========================= -->
<!-- RENAME MODAL -->
<!-- ========================= -->
<div id="renameModal" class="modal hidden">
  <div class="modal-card">
    <h2>✏ Rename Chat</h2>

    <input id="renameInput" type="text" maxlength="60" placeholder="New name">

    <div class="modal-actions">
      <button onclick="saveRename()">Save</button>
      <button class="ghost" onclick="closeRename()">Cancel</button>
    </div>
  </div>
</div>

<!-- ========================= -->
<!-- DELETE MODAL -->
<!-- ========================= -->
<div id="deleteModal" class="modal hidden">
  <div class="modal-card">
    <h2>🗑 Delete Chat</h2>
    <p>Are you sure you want to delete this chat?</p>

    <div class="modal-actions">
      <button class="danger" onclick="confirmDelete()">Delete</button>
      <button class="ghost" onclick="closeDelete()">Cancel</button>
    </div>
  </div>
</div>

<!-- ========================= -->
<!-- APP -->
<!-- ========================= -->
<div class="app">

  <!-- ========================= -->
  <!-- SIDEBAR -->
  <!-- ========================= -->
  <aside id="sidebar" class="sidebar">

    <!-- Logo -->
    <div class="brand">
      <div class="logo">✦</div>
      <div class="brand-text">
        <h1>NeuroMV</h1>
        <span>Powered by Neuro-core</span>
      </div>
    </div>

    <!-- New Chat -->
    <button class="new-chat-btn" onclick="newChat()">
      ＋ New Chat
    </button>

    <!-- Chat List -->
    <div class="section-title">
      Chats
    </div>

    <div id="history" class="history-list"></div>

    <!-- Footer -->
    <div class="sidebar-footer">

      <!-- Private -->
      <button class="menu-btn" onclick="openPrivate()">
        🔒 Private
      </button>

      <!-- More -->
      <button class="menu-btn" onclick="toggleMoreMenu()">
        ⋮
      </button>

      <!-- Hidden Dropdown -->
      <div id="moreMenu" class="more-menu hidden">
        <button onclick="openPrivate()">🔒 Private Chats</button>
        <button onclick="setPinPrompt()">🛡 Set / Change PIN</button>
      </div>

    </div>

  </aside>

  <!-- ========================= -->
  <!-- MAIN -->
  <!-- ========================= -->
  <main class="main">

    <!-- MOBILE TOPBAR -->
    <div class="mobile-topbar">

      <button class="hamburger" onclick="toggleSidebar()">
        ☰
      </button>

      <div class="mobile-title">
        NeuroMV
      </div>

      <button class="dots-btn" onclick="toggleMoreMenu()">
        ⋮
      </button>

    </div>

    <!-- CHAT AREA -->
    <div id="chat" class="chat-area">

      <!-- Welcome -->
      <div class="welcome">
        <h2>NeuroMV</h2>
        <p>Your intelligent AI assistant</p>
      </div>

    </div>

    <!-- FILE PREVIEW -->
    <div id="preview" class="preview-wrap"></div>

    <!-- INPUT -->
    <form id="form" class="input-wrap">

      <!-- Upload -->
      <label class="upload-btn">
        +
        <input type="file" id="file" hidden>
      </label>

      <!-- Text -->
      <textarea
        id="input"
        rows="1"
        placeholder="Message NeuroMV..."
        autocomplete="off"
      ></textarea>

      <!-- Send -->
      <button id="sendBtn" type="submit">
        ➤
      </button>

    </form>

  </main>

</div>

<script src="/static/script.js"></script>

</body>
</html>
