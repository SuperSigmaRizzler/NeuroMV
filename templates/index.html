<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NeuroMV</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- PIN MODAL -->
<div id="pinModal" class="modal hidden">
  <div class="modal-box">
    <h3>Enter PIN</h3>
    <input id="pinInput" type="password" placeholder="••••••">
    <button onclick="submitPin()">Unlock</button>
  </div>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="new-chat" onclick="newChat()">+ New Chat</button>

    <h3>Chats</h3>
    <div id="history"></div>

    <h3>Private 🔒</h3>
    <div id="private"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- MENU (mobile optional) -->
    <div class="menu" onclick="toggleMenu()">☰</div>

    <!-- CHAT AREA -->
    <div id="chat" class="chat"></div>

    <!-- PREVIEW AREA -->
    <div id="preview" class="preview"></div>

    <!-- INPUT -->
    <form id="form" class="input-area">
      
      <label class="file-btn">
        +
        <input type="file" id="file" hidden>
      </label>

      <textarea id="input" placeholder="Message NeuroMV..."></textarea>

      <button type="submit">Send</button>

    </form>

  </main>

</div>

<script src="/static/script.js"></script>
</body>
</html>
