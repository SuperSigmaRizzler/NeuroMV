<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>NeuroMV</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- PIN MODAL -->
<div id="pinModal" class="modal hidden">
  <div class="modal-card">
    <h2>🛡 Change PIN</h2>
    <p id="pinText">Enter PIN</p>

    <input id="pinInput" type="password" maxlength="20" placeholder="PIN">

    <div class="modal-actions">
      <button type="button" onclick="submitPin()">Continue</button>
      <button type="button" class="ghost" onclick="closePin()">Cancel</button>
    </div>
  </div>
</div>

<!-- RENAME -->
<div id="renameModal" class="modal hidden">
  <div class="modal-card">
    <h2>✏ Rename Chat</h2>
    <input id="renameInput" type="text" maxlength="60" placeholder="New name">
    <div class="modal-actions">
      <button type="button" onclick="saveRename()">Save</button>
      <button type="button" class="ghost" onclick="closeRename()">Cancel</button>
    </div>
  </div>
</div>

<!-- DELETE -->
<div id="deleteModal" class="modal hidden">
  <div class="modal-card">
    <h2>🗑 Delete Chat</h2>
    <p>Delete this chat permanently?</p>
    <div class="modal-actions">
      <button type="button" class="danger" onclick="confirmDelete()">Delete</button>
      <button type="button" class="ghost" onclick="closeDelete()">Cancel</button>
    </div>
  </div>
</div>

<div class="app">

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar">

<div class="sidebar-close-mobile">
<button onclick="closeSidebarMobile()">✕</button>
</div>

<div class="brand">
<div class="logo">✦</div>
<div class="brand-text">
<h1>NeuroMV</h1>
<span>Made by Marvell Jonathan</span>
</div>
</div>

<button class="new-chat-btn" onclick="newChat()">＋ New Chat</button>

<div class="section-title">Chats</div>

<div id="history" class="history-list"></div>

<div class="sidebar-footer">

<button class="menu-btn" onclick="openPrivate()">
🔒 Private
</button>

<button class="menu-btn" onclick="toggleMoreMenu()">
⋮
</button>

<div id="moreMenu" class="more-menu hidden">
<button onclick="openPrivate()">🔒 Private Chats</button>
<button onclick="setPinPrompt()">🛡 Change PIN</button>
<button onclick="toggleMoreMenu()">✕ Close</button>
</div>

</div>
</aside>

<!-- MAIN -->
<main class="main">

<div id="overlay" class="overlay hidden" onclick="closeSidebarMobile()"></div>

<div class="mobile-topbar">
<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="mobile-title">NeuroMV</div>
<button class="dots-btn" onclick="toggleMoreMenu()">⋮</button>
</div>

<div id="chat" class="chat-area">
<div class="welcome">
<h2>NeuroMV</h2>
<p>Your intelligent AI assistant</p>
</div>
</div>

<div id="preview" class="preview-wrap"></div>

<form id="form" class="input-wrap">

<label class="upload-btn">
+
<input type="file" id="file" hidden>
</label>

<textarea
id="input"
rows="1"
placeholder="Message NeuroMV..."
autocomplete="off"
spellcheck="false"
></textarea>

<button type="submit" id="sendBtn">➤</button>

</form>

</main>
</div>

<script src="/static/script.js"></script>
</body>
</html>
